name: ready-suite-lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hub
        uses: actions/checkout@v4

      - name: Run ready-suite-lint
        run: bash scripts/lint.sh --verbose

      - name: Run strict trigger lint
        run: bash scripts/lint.sh --strict-triggers --verbose
