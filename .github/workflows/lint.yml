name: ready-suite-lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC: catches drift in sibling repos after they
    # land changes (the hub itself is not pushed every time a
    # specialist patches).
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hub
        uses: actions/checkout@v4
        with:
          path: ready-suite

      - name: Clone sibling repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p siblings
          for skill in kickoff-ready prd-ready architecture-ready roadmap-ready stack-ready repo-ready production-ready deploy-ready observe-ready launch-ready harden-ready; do
            git clone --depth 100 --quiet "https://github.com/aihxp/${skill}.git" "siblings/${skill}"
          done

      - name: Run ready-suite-lint
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          READY_SUITE_REPOS_DIR: ${{ github.workspace }}/siblings
        run: bash ready-suite/scripts/lint.sh --verbose
