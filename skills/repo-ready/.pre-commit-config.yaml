# .pre-commit-config.yaml
# Run locally via: pre-commit install && pre-commit run --all-files
# https://pre-commit.com/

repos:
  # Standard hygiene hooks — whitespace, EOF, YAML well-formedness, line endings.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: \.md$
      - id: check-yaml
      - id: mixed-line-ending
        args: [--fix=lf]

  # Markdown lint — rules live in .markdownlint.json.
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.2
    hooks:
      - id: markdownlint-cli2

  # Prettier for Markdown only — config in .prettierrc.json, exclusions in .prettierignore.
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types: [markdown]

  # Secret scanner — config lives in .gitleaks.toml.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
